<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🥭 망고의 라이어 게임 🥭</title>
    <script>
        (function() {
            if(localStorage.getItem('mangoLiarDisplayMode') === 'dark') document.documentElement.classList.add('dark-mode');
            if(localStorage.getItem('mangoLiarExcelMode') === 'true') document.documentElement.classList.add('excel-mode');
        })();
    </script>
    <style>
        :root {
            --bg-color: #FFF9E6;
            --text-color: #333333;
            --container-bg: #FFFFFF;
            --border-color: #FFD700;
            --input-bg: #FFFDF0;
            --subtitle-color: #D2691E;
            --shadow-color: rgba(255, 215, 0, 0.2);
            --label-color: #FF8C00;
            --item-bg: #FFFDF0;
            --btn-gradient: linear-gradient(45deg, #FFD700, #FF8C00);
            --font-family: 'Malgun Gothic', sans-serif;
        }

        html.dark-mode {
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --container-bg: #1c1c1e;
            --border-color: #FF9500;
            --input-bg: #2c2c2e;
            --subtitle-color: #FF9500;
            --shadow-color: rgba(255, 149, 0, 0.15);
            --label-color: #FF9500;
            --item-bg: #2c2c2e;
            --btn-gradient: linear-gradient(45deg, #FF9500, #CC7000);
        }

        html.excel-mode {
            --bg-color: #f3f2f1;
            --container-bg: #ffffff;
            --border-color: #107c41;
            --input-bg: #ffffff;
            --subtitle-color: #333333;
            --shadow-color: rgba(0,0,0,0.1);
            --label-color: #107c41;
            --item-bg: #f9f9f9;
            --btn-gradient: #107c41;
            --font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
        }

        html.excel-mode.dark-mode {
            --bg-color: #212121;
            --container-bg: #333333;
            --border-color: #217346;
            --input-bg: #444444;
            --subtitle-color: #dddddd;
            --label-color: #4CAF50;
            --item-bg: #444444;
            --btn-gradient: #217346;
        }

        html.excel-mode .container { border-radius: 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); }
        html.excel-mode input[type="text"], html.excel-mode button, html.excel-mode .room-list-box { border-radius: 0; }
        html.excel-mode .round-label, html.excel-mode .emoji-label { border-radius: 0; border: 1px solid #ccc; }

        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-color); text-align: center; padding-top: 50px; transition: all 0.3s ease; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: var(--container-bg); padding: 40px; border-radius: 30px; border: 4px solid var(--border-color); box-shadow: 0 0 30px var(--shadow-color); transition: all 0.3s ease; position: relative; }

        .top-btn-group { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; }
        .mode-toggle-btn { background: var(--input-bg); border: 2px solid var(--border-color); color: var(--text-color); padding: 6px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; width: auto; box-sizing: border-box; transition: 0.2s; }
        html.excel-mode .mode-toggle-btn { border-radius: 0; }
        .mode-toggle-btn:hover { transform: scale(1.05); }

        h1 { color: var(--label-color); margin-bottom: 5px; font-size: 32px; transition: 0.2s; }
        .subtitle { color: var(--subtitle-color); margin-bottom: 30px; font-weight: bold; transition: 0.2s; }

        .form-group { margin-bottom: 25px; text-align: left; }
        .form-group > label { display: block; margin-bottom: 12px; color: var(--label-color); font-weight: bold; transition: 0.2s; font-size: 20px; }

        input[type="text"] { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid var(--border-color); box-sizing: border-box; background: var(--input-bg); color: var(--text-color); font-size: 18px; transition: all 0.3s; }

        .emoji-group { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; justify-items: center; }
        .emoji-label { font-size: 28px; cursor: pointer; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; border-radius: 15px; background: var(--item-bg); border: 2px solid var(--border-color); transition: all 0.2s; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .emoji-label { background: var(--border-color); transform: scale(1.1); box-shadow: 0 0 10px var(--border-color); }

        .round-group { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px;}
        .round-label { flex: 1; text-align: center; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 10px; background: var(--item-bg); border: 2px solid var(--border-color); transition: all 0.2s; color: var(--text-color); font-size: 18px;}
        input[name="rounds"]:checked + .round-label { background: var(--border-color); color: #FFF; border-color: var(--border-color);}

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 15px; background: linear-gradient(45deg, var(--border-color), #FF8C00); color: #553300; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 5px 15px var(--shadow-color); }

        .divider { margin: 30px 0; border-bottom: 2px dashed var(--border-color); transition: 0.2s; }

        .room-list-box { background: var(--input-bg); border: 2px solid var(--border-color); border-radius: 10px; padding: 15px; max-height: 200px; overflow-y: auto; text-align: left; transition: all 0.3s; }
        .room-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed var(--border-color); }
        .room-item:last-child { border-bottom: none; }
        .room-btn { width: auto; padding: 8px 15px; margin: 0; font-size: 14px; background: var(--border-color); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}
        .room-btn:hover { background: #FF8C00; }
        .room-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-btn-group">
        <button class="mode-toggle-btn" onclick="toggleExcelMode()">📊 엑셀</button>
        <button class="mode-toggle-btn" onclick="toggleDisplayMode()"><span id="modeIcon">🌙</span> <span id="modeText">다크</span></button>
    </div>

    <h1>🥭 망고의 라이어 게임 🥭</h1>
    <div class="subtitle">속고 속이는 극한의 심리게임!</div>

    <div class="form-group">
        <label>🐾 나만의 이모지 선택</label>
        <div class="emoji-group">
            <label><input type="radio" name="emoji" value="🥭" checked><div class="emoji-label">🥭</div></label>
            <label><input type="radio" name="emoji" value="🍓"><div class="emoji-label">🍓</div></label>
            <label><input type="radio" name="emoji" value="🍒"><div class="emoji-label">🍒</div></label>
            <label><input type="radio" name="emoji" value="🍎"><div class="emoji-label">🍎</div></label>
            <label><input type="radio" name="emoji" value="🍇"><div class="emoji-label">🍇</div></label>
            <label><input type="radio" name="emoji" value="🥝"><div class="emoji-label">🥝</div></label>
            <label><input type="radio" name="emoji" value="🍊"><div class="emoji-label">🍊</div></label>
            <label><input type="radio" name="emoji" value="🍉"><div class="emoji-label">🍉</div></label>
            <label><input type="radio" name="emoji" value="🍌"><div class="emoji-label">🍌</div></label>
            <label><input type="radio" name="emoji" value="🥑"><div class="emoji-label">🥑</div></label>
        </div>
        <label>👑 닉네임</label>
        <input type="text" id="myNickname" placeholder="닉네임 (최대 2글자)" maxlength="2">
    </div>

    <div class="divider"></div>

    <div class="form-group">
        <label>📛 방 제목 입력 (방장용)</label>
        <input type="text" id="roomTitleInput" placeholder="방 제목을 설정해보세요">
    </div>

    <div class="form-group">
        <label>🔒 방 비밀번호 설정 (선택)</label>
        <input type="text" id="roomPasswordInput" placeholder="비밀번호 설정 (미입력 시 공개방으로 개설)">
    </div>

    <div class="form-group">
        <label>🎯 새로운 방 파기 (방장용)</label>
        <div class="round-group">
            <label><input type="radio" name="rounds" value="3" checked><div class="round-label">3 라운드</div></label>
            <label><input type="radio" name="rounds" value="5"><div class="round-label">5 라운드</div></label>
            <label><input type="radio" name="rounds" value="10"><div class="round-label">10 라운드</div></label>
        </div>
    </div>

    <form action="/create-room" method="POST" onsubmit="return saveInfo()">
        <button type="submit" class="btn-submit">새로운 방 만들기</button>
    </form>

    <div class="divider"></div>

    <div class="form-group">
        <label>🔥 현재 참여 가능한 방 목록</label>
        <div id="roomListContainer" class="room-list-box">
            <div style="text-align:center; color:#888;">방 목록을 불러오는 중...</div>
        </div>
    </div>
</div>

<script>
    function updateToggleButtons() {
        var isDark = document.documentElement.classList.contains('dark-mode');
        var modeIcon = document.getElementById('modeIcon');
        var modeText = document.getElementById('modeText');
        if(modeIcon && modeText) {
            modeIcon.innerText = isDark ? '☀️' : '🌙';
            modeText.innerText = isDark ? '라이트' : '다크';
        }
    }

    function toggleDisplayMode() {
        if (document.documentElement.classList.contains('dark-mode')) {
            document.documentElement.classList.remove('dark-mode');
            localStorage.setItem('mangoLiarDisplayMode', 'light');
        } else {
            document.documentElement.classList.add('dark-mode');
            localStorage.setItem('mangoLiarDisplayMode', 'dark');
        }
        updateToggleButtons();
    }

    function toggleExcelMode() {
        if (document.documentElement.classList.contains('excel-mode')) {
            document.documentElement.classList.remove('excel-mode');
            localStorage.setItem('mangoLiarExcelMode', 'false');
        } else {
            document.documentElement.classList.add('excel-mode');
            localStorage.setItem('mangoLiarExcelMode', 'true');
        }
    }

    window.onload = function() {
        updateToggleButtons();

        fetch('/api/rooms')
            .then(res => res.json())
            .then(data => {
                var container = document.getElementById('roomListContainer');
                container.innerHTML = '';
                if(data.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#888; padding:20px;">현재 열려있는 방이 없습니다.</div>';
                } else {
                    data.forEach(function(room) {
                        var isFull = room.playerCount >= 10;
                        // [비밀방 상태 레이블 다이내믹 변경 연동]
                        var status = room.isPlaying ? '<span style="color:#ff4500">[게임중]</span>' : (isFull ? '<span style="color:gray">[만원]</span>' : (room.hasPassword ? '<span style="color:#FF9500">[🔒비밀방]</span>' : '<span style="color:#32CD32">[대기중]</span>'));
                        var btnDisabled = isFull ? 'disabled' : '';

                        container.innerHTML += `
                            <div class="room-item">
                                <div>
                                    <strong style="font-size:18px; color: var(--panel-border);">${room.roomTitle}</strong> ${status}<br>
                                    <span style="font-size:14px; opacity: 0.8;">코드: ${room.roomId} | 인원: ${room.playerCount}/10 | ${room.totalRounds}라운드제</span>
                                </div>
                                <button class="room-btn" onclick="quickJoin('${room.roomId}', ${room.hasPassword})" ${btnDisabled}>입장하기</button>
                            </div>
                        `;
                    });
                }
            });
    };

    // [신규 가공] 목록 클릭 시 다이내믹 인터셉트 조인 가드 함수
    function quickJoin(code, hasPassword) {
        var nickname = document.getElementById('myNickname').value.trim();
        var emoji = document.querySelector('input[name="emoji"]:checked').value;

        if(!nickname || nickname.length > 2) { alert('닉네임은 최대 2글자까지만 입력해주세요!'); return; }

        var enteredPassword = "";
        if (hasPassword) {
            enteredPassword = prompt("🔒 비밀방입니다. 비밀번호를 입력해주세요:");
            if (enteredPassword === null) return; // 취소 처리 가드
        }

        sessionStorage.setItem('liarGameNickname', nickname);
        sessionStorage.setItem('liarGameEmoji', emoji);
        sessionStorage.setItem('liarGameRounds', "0");
        sessionStorage.setItem('liarGameRoomPassword', enteredPassword); // 입력값 스토리지 주입
        window.location.href = '/room/' + code;
    }

    function saveInfo() {
        var nickname = document.getElementById('myNickname').value.trim();
        var emoji = document.querySelector('input[name="emoji"]:checked').value;
        var rounds = document.querySelector('input[name="rounds"]:checked').value;
        var title = document.getElementById('roomTitleInput').value.trim() || "망고의 라이어 게임방";
        var password = document.getElementById('roomPasswordInput').value.trim();

        if(!nickname || nickname.length > 2) { alert('닉네임은 최대 2글자까지만 입력해주세요!'); return false; }

        sessionStorage.setItem('liarGameNickname', nickname);
        sessionStorage.setItem('liarGameEmoji', emoji);
        sessionStorage.setItem('liarGameRounds', rounds);
        sessionStorage.setItem('liarGameRoomTitle', title);
        sessionStorage.setItem('liarGameRoomPassword', password); // 생성 스토리지 주입
        return true;
    }
</script>
</body>
</html>
